name: macos-build
on:
  push:
    tags-ignore:
      - "clojure-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "The existing tag to publish"
        type: "string"
        required: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            arch: aarch64
          - os: macos-15-intel
            arch: x86_64
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            zig/.zig-cache
          key: ${{ matrix.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ matrix.os }}-cargo-

      - name: Install LLVM@21
        run: |
          # llvm@22 crashes in setSymbolInRelocationInfo on Mach-O — use llvm@21
          brew install llvm@21 cmake protobuf
          brew cleanup --prune=all
          echo "/opt/homebrew/opt/llvm@21/bin:/usr/local/opt/llvm@21/bin" >> $GITHUB_PATH

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - uses: denoland/setup-deno@v2

      - name: Build Web UI
        run: |
          cd webui/rockbox
          deno install
          deno run build
          deno clean
          rm -rf node_modules

      - name: Rust flags
        run: echo "RUSTFLAGS=-A warnings" >> $GITHUB_ENV

      - name: Build rockboxd (headless)
        run: bash scripts/build-headless.sh
        env:
          TAG: ${{ inputs.tag || github.ref_name }}

      - name: Clean incremental artifacts (post-headless)
        run: rm -rf target/release/incremental target/release/build

      - name: Build librockboxd.a (embedded daemon for Swift app)
        run: |
          cargo build --release -p rockbox-embed
          CPU_FLAG=""
          [ "$(uname -m)" = "x86_64" ] && CPU_FLAG="-Dcpu=x86_64"
          cd zig && zig build lib -Doptimize=ReleaseFast $CPU_FLAG
        env:
          TAG: ${{ inputs.tag || github.ref_name }}

      - name: Clean incremental artifacts (post-lib)
        run: rm -rf target/release/incremental target/release/build build-headless zig/.zig-cache

      - name: Build rockbox CLI
        run: cargo build -p rockbox --release
        env:
          TAG: ${{ inputs.tag || github.ref_name }}

      - name: Clean build artifacts
        run: |
          mkdir -p /tmp/rb-bins
          cp target/release/rockbox           /tmp/rb-bins/
          cp zig/zig-out/bin/rockboxd         /tmp/rb-bins/
          cp zig/zig-out/lib/librockboxd.a    /tmp/rb-bins/
          rm -rf target build-lib build-headless zig/.zig-cache
          mkdir -p target/release zig/zig-out/bin zig/zig-out/lib
          mv /tmp/rb-bins/rockbox          target/release/rockbox
          mv /tmp/rb-bins/rockboxd         zig/zig-out/bin/rockboxd
          mv /tmp/rb-bins/librockboxd.a    zig/zig-out/lib/librockboxd.a

      - name: Determine version
        id: vars
        run: |
          echo "version=${{ inputs.tag || github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Show artifacts
        run: |
          ls -lh target/release/rockbox zig/zig-out/bin/rockboxd zig/zig-out/lib/librockboxd.a

      - name: Package binaries
        run: |
          VERSION="${{ steps.vars.outputs.version }}"
          ARCH="${{ matrix.arch }}"
          cp target/release/rockbox .
          cp zig/zig-out/bin/rockboxd .
          tar czvf rockbox_${VERSION}_${ARCH}-darwin.tar.gz rockbox rockboxd
          shasum -a 256 rockbox_${VERSION}_${ARCH}-darwin.tar.gz \
            > rockbox_${VERSION}_${ARCH}-darwin.tar.gz.sha256

      #- name: Generate Package Installer
      #  run: ./packaging/macos/build-pkg.sh

      # - name: Build DMG
      #   if: matrix.arch == 'aarch64'
      #   run: |
      #     VERSION="${{ steps.vars.outputs.version }}"
      #     ARCH="${{ matrix.arch }}"
      #     xcodebuild -scheme Rockbox -configuration Release archive \
      #       -archivePath ./build/Rockbox.xcarchive
      #     xcodebuild -exportArchive \
      #       -archivePath ./build/Rockbox.xcarchive \
      #       -exportPath ./build \
      #       -exportOptionsPlist ExportOptions.plist
      #     mkdir dmg_temp
      #     cp -r build/Rockbox.app dmg_temp
      #     hdiutil create -volname "Rockbox" -srcfolder dmg_temp -ov -format UDZO \
      #       Rockbox-${VERSION}-${ARCH}.dmg
      #     mv Rockbox-${VERSION}-${ARCH}.dmg ..
      #     rm -rf ../build dmg_temp ~/Library/Developer/Xcode/DerivedData
      #   working-directory: macos

      - name: Upload to GitHub Release (aarch64)
        if: matrix.arch == 'aarch64'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            rockbox_${{ steps.vars.outputs.version }}_${{ matrix.arch }}-darwin.tar.gz
            rockbox_${{ steps.vars.outputs.version }}_${{ matrix.arch }}-darwin.tar.gz.sha256
          tag_name: ${{ steps.vars.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to GitHub Release (x86_64)
        if: matrix.arch == 'x86_64'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            rockbox_${{ steps.vars.outputs.version }}_${{ matrix.arch }}-darwin.tar.gz
            rockbox_${{ steps.vars.outputs.version }}_${{ matrix.arch }}-darwin.tar.gz.sha256
          tag_name: ${{ steps.vars.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
