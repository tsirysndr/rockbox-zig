name: linux-aarch64-build
on:
  push:
    tags-ignore:
      - "clojure-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "The existing tag to publish"
        type: "string"
        required: true

jobs:
  publish:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libunwind-dev \
            libasound2-dev \
            libdbus-1-dev \
            protobuf-compiler \
            curl \
            wget \
            zip \
            unzip \
            cmake

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Build Web UI
        run: |
          cd webui/rockbox
          deno install
          deno run build

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            zig/.zig-cache
            target
          key: linux-aarch64-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-aarch64-cargo-

      - name: Rust flags
        run: echo "RUSTFLAGS=-A warnings" >> $GITHUB_ENV

      - name: Build rockboxd (headless)
        run: bash scripts/build-headless.sh
        env:
          TAG: ${{ inputs.tag || github.ref_name }}

      - name: Build rockbox CLI
        run: cargo build -p rockbox --release
        env:
          TAG: ${{ inputs.tag || github.ref_name }}

      - name: Build rockbox-embed
        run: cargo build --release -p rockbox-embed

      - name: Build librockboxd.a
        run: cd zig && zig build lib -Doptimize=ReleaseFast

      - name: Determine version
        id: vars
        run: |
          echo "version=${{ inputs.tag || github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Package binaries
        run: |
          VERSION="${{ steps.vars.outputs.version }}"
          cp target/release/rockbox .
          cp zig/zig-out/bin/rockboxd .
          tar czvf rockbox_${VERSION}_aarch64-linux.tar.gz rockbox rockboxd
          sha256sum rockbox_${VERSION}_aarch64-linux.tar.gz \
            > rockbox_${VERSION}_aarch64-linux.tar.gz.sha256

      - name: Package librockboxd.a
        run: |
          VERSION="${{ steps.vars.outputs.version }}"
          mkdir -p dist/lib dist/include
          cp zig/zig-out/lib/librockboxd.a dist/lib/
          cp include/rockboxd.h             dist/include/
          ARCHIVE="librockboxd_${VERSION}_aarch64-linux.tar.gz"
          tar -C dist -czf "$ARCHIVE" lib include
          sha256sum "$ARCHIVE" > "${ARCHIVE}.sha256"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            rockbox_${{ steps.vars.outputs.version }}_aarch64-linux.tar.gz
            rockbox_${{ steps.vars.outputs.version }}_aarch64-linux.tar.gz.sha256
            librockboxd_${{ steps.vars.outputs.version }}_aarch64-linux.tar.gz
            librockboxd_${{ steps.vars.outputs.version }}_aarch64-linux.tar.gz.sha256
          tag_name: ${{ steps.vars.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
