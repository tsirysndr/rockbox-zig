name: linux-x86_64-check
on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libunwind-dev \
            libasound2-dev \
            libdbus-1-dev \
            protobuf-compiler \
            cmake

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            zig/.zig-cache
            target
          key: linux-x86_64-check-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-x86_64-check-cargo-

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Build Web UI
        run: |
          cd webui/rockbox
          deno install
          deno run build

      - name: Rust flags
        run: echo "RUSTFLAGS=-C target-cpu=x86-64 -A warnings" >> $GITHUB_ENV

      - name: Build rockboxd (headless)
        run: bash scripts/build-headless.sh

      - name: Build rockbox CLI
        run: cargo build -p rockbox --release

      - name: Show artifacts
        run: ls -lh target/release/rockbox zig/zig-out/bin/rockboxd
