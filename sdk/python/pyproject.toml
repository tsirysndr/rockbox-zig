[project]
name = "rockbox-sdk"
version = "0.1.0"
description = "Python SDK for Rockbox — async GraphQL client with subscriptions and plugins"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [
    { name = "Tsiry Sandratraina", email = "tsiry.sndr@rocksky.app" },
]
keywords = ["rockbox", "graphql", "audio", "music-player", "sdk"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Framework :: AsyncIO",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Multimedia :: Sound/Audio",
    "Topic :: Software Development :: Libraries",
    "Typing :: Typed",
]
dependencies = [
    "httpx>=0.27",
    "websockets>=13",
    "pydantic>=2.6",
]

[project.urls]
Homepage = "https://github.com/tsirysndr/rockbox-zig"
Repository = "https://github.com/tsirysndr/rockbox-zig"
Issues = "https://github.com/tsirysndr/rockbox-zig/issues"

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "pytest-httpx>=0.32",
    "ruff>=0.6",
    "mypy>=1.10",
]

[build-system]
requires = ["uv_build>=0.11.6,<0.12.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "rockbox_sdk"
module-root = "src"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "N"]
ignore = ["E501", "SIM105"]

[tool.mypy]
python_version = "3.10"
strict = true
warn_unused_ignores = true
