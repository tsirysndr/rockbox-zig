# Depot CI Migration
# Source: .github/workflows/linux-armhf-build.yml
#
# Changes made:
# - Changed GitHub runs-on labels to their Depot equivalents

name: linux-armhf-build
on:
  push:
    tags-ignore:
      - "clojure-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "The existing tag to publish"
        type: "string"
        required: true
jobs:
  publish:
    runs-on: depot-ubuntu-latest # was: ubuntu-latest. Mapped standard GitHub runner to Depot equivalent.
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: arm-unknown-linux-gnueabihf
      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: linux-armhf-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-armhf-cargo-
      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Build Web UI
        run: |
          cd webui/rockbox
          deno install
          deno run build
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install admin UI dependencies
        working-directory: crates/s3/s3webui
        run: bun install --frozen-lockfile
      - name: Build admin UI
        working-directory: crates/s3/s3webui
        run: bun run build
      - name: Rust flags
        run: echo "RUSTFLAGS=-A warnings" >> $GITHUB_ENV
      - name: Build rockboxd for arm-unknown-linux-gnueabihf
        run: bash scripts/build-armhf.sh
        env:
          TAG: ${{ inputs.tag || github.ref_name }}
      - name: Determine version
        id: vars
        run: |
          echo "version=${{ inputs.tag || github.ref_name }}" >> $GITHUB_OUTPUT
      - name: Package binary
        run: |
          VERSION="${{ steps.vars.outputs.version }}"
          cp zig/zig-out/bin/rockboxd .
          tar czvf rockbox_${VERSION}_armhf-linux.tar.gz rockboxd
          sha256sum rockbox_${VERSION}_armhf-linux.tar.gz \
            > rockbox_${VERSION}_armhf-linux.tar.gz.sha256
      - name: Install dpkg-dev
        run: sudo apt-get install -y dpkg-dev
      - name: Build .deb (armhf)
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.vars.outputs.version }}"
          pkg_root="dist/debian/armhf"
          mkdir -p "$pkg_root/usr/local/bin"
          install -m 0755 zig/zig-out/bin/rockboxd "$pkg_root/usr/local/bin/rockboxd"
          sed -i "s/^Version: .*/Version: ${VERSION}/" "$pkg_root/DEBIAN/control"
          dpkg-deb --build --root-owner-group "$pkg_root" "rockbox_${VERSION}_armhf.deb"
          sha256sum "rockbox_${VERSION}_armhf.deb" > "rockbox_${VERSION}_armhf.deb.sha256"
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            rockbox_${{ steps.vars.outputs.version }}_armhf-linux.tar.gz
            rockbox_${{ steps.vars.outputs.version }}_armhf-linux.tar.gz.sha256
            rockbox_${{ steps.vars.outputs.version }}_armhf.deb
            rockbox_${{ steps.vars.outputs.version }}_armhf.deb.sha256
          tag_name: ${{ steps.vars.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Check Gemfury secrets
        id: gemfury
        env:
          FURY_TOKEN: ${{ secrets.FURY_TOKEN }}
          FURY_ACCOUNT: ${{ secrets.FURY_ACCOUNT }}
        run: |
          if [ -n "${FURY_TOKEN:-}" ] && [ -n "${FURY_ACCOUNT:-}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Gemfury secrets not set; skipping push"
          fi
      - name: Push .deb to Gemfury
        if: steps.gemfury.outputs.available == 'true'
        env:
          FURY_TOKEN: ${{ secrets.FURY_TOKEN }}
          FURY_ACCOUNT: ${{ secrets.FURY_ACCOUNT }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          for pkg in rockbox_*_armhf.deb; do
            echo "Pushing $pkg to Gemfury (${FURY_ACCOUNT})"
            curl -fsS -F package=@"${pkg}" \
              "https://${FURY_TOKEN}@push.fury.io/${FURY_ACCOUNT}/"
            echo
          done
