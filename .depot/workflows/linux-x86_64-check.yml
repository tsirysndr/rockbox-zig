# Depot CI Migration
# Source: .github/workflows/linux-x86_64-check.yml
#
# Changes made:
# - Changed GitHub runs-on labels to their Depot equivalents

name: linux-x86_64-check
on:
  push:
    branches:
      - "**"
  pull_request:
jobs:
  build:
    runs-on: depot-ubuntu-latest # was: ubuntu-latest. Mapped standard GitHub runner to Depot equivalent.
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libunwind-dev \
            libasound2-dev \
            libdbus-1-dev \
            protobuf-compiler \
            cmake
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            zig/.zig-cache
            target
          key: linux-x86_64-check-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-x86_64-check-cargo-
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Build Web UI
        run: |
          cd webui/rockbox
          deno install
          deno run build
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install admin UI dependencies
        working-directory: crates/s3/s3webui
        run: bun install --frozen-lockfile
      - name: Build admin UI
        working-directory: crates/s3/s3webui
        run: bun run build
      - name: Rust flags
        run: echo "RUSTFLAGS=-C target-cpu=x86-64 -A warnings" >> $GITHUB_ENV
      - name: Build rockboxd (headless)
        run: bash scripts/build-headless.sh
      - name: Build rockbox CLI
        run: cargo build -p rockbox --release
      - name: Clean build artifacts
        run: |
          mkdir -p /tmp/rb-bins
          cp target/release/rockbox   /tmp/rb-bins/
          cp zig/zig-out/bin/rockboxd /tmp/rb-bins/
          rm -rf target build-lib build-headless zig/.zig-cache
          mkdir -p target/release zig/zig-out/bin
          mv /tmp/rb-bins/rockbox   target/release/rockbox
          mv /tmp/rb-bins/rockboxd  zig/zig-out/bin/rockboxd
      - name: Show artifacts
        run: ls -lh target/release/rockbox zig/zig-out/bin/rockboxd
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rockbox-linux-x86_64
          path: |
            target/release/rockbox
            zig/zig-out/bin/rockboxd
